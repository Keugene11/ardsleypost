workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      groups:
        - appstore_credentials
      node: 20
    scripts:
      - name: Install dependencies
        script: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm install
      - name: Sync Capacitor
        script: pnpm exec cap sync ios
      - name: Fetch signing files
        script: |
          pip3 install codemagic-cli-tools
          export APP_STORE_CONNECT_KEY_IDENTIFIER=$APP_STORE_CONNECT_KEY_IDENTIFIER
          export APP_STORE_CONNECT_ISSUER_ID=$APP_STORE_CONNECT_ISSUER_ID
          export APP_STORE_CONNECT_PRIVATE_KEY="$APP_STORE_CONNECT_PRIVATE_KEY"
          app-store-connect fetch-signing-files "com.ardsleypost.app" \
            --type IOS_APP_STORE \
            --create
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Build archive
        script: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive | xcpretty
      - name: Export IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --archive build/App.xcarchive
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
